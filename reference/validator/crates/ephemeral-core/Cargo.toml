[package]
name = "ephemeral-core"
description = "EPHEMERAL Agent-Authority Protocol reference validator library"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
jsonschema = { workspace = true }
unicode-normalization = { workspace = true }
caseless = { workspace = true }
time = { workspace = true }
hex = { workspace = true }
ephemeral-crypto = { path = "../ephemeral-crypto" }
# test-fixtures feature is required: the c2-live conformance vectors embed a
# synthetic CA root whose fingerprint is NOT in ALLOWED_FINGERPRINTS. The
# reference validator is itself a conformance harness; the D-2 CI guard
# ensures this feature never reaches a production binary.
ephemeral-attestation = { path = "../ephemeral-attestation", features = ["test-fixtures"] }

[dev-dependencies]
anyhow = { workspace = true }
proptest = { workspace = true }
