[package]
name = "ephemeral-core"
description = "EPHEMERAL Agent-Authority Protocol reference validator library"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
jsonschema = { workspace = true }
unicode-normalization = { workspace = true }
caseless = { workspace = true }
time = { workspace = true }
hex = { workspace = true }
ephemeral-crypto = { path = "../ephemeral-crypto" }
ephemeral-attestation = { path = "../ephemeral-attestation" }

[features]
# Enables the Phase C.2 live-Nitro dispatch path (classify_live_nitro + the
# synthetic-root bypass in ephemeral-attestation's test-fixtures feature).
# This MUST remain opt-in: the bypass allows inserting CA roots without
# fingerprint pinning, which is only safe inside the conformance harness.
# The reference CLI (ephemeral-cli) enables it explicitly; production
# consumers of ephemeral-core do not, so the live-path code is absent
# from their build entirely. Do not move this into `default`.
test-fixtures = ["ephemeral-attestation/test-fixtures"]

[dev-dependencies]
anyhow = { workspace = true }
proptest = { workspace = true }
