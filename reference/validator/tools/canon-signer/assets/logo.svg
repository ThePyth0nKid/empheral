<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="canon-signer wax seal">
  <title>canon-signer</title>
  <desc>Retro wax seal — cryptographic notary, Ed25519 + COSE_Sign1, Anno MMXXVI.</desc>
  <defs>
    <radialGradient id="wax" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#d84646"/>
      <stop offset="45%" stop-color="#a32424"/>
      <stop offset="100%" stop-color="#480a0a"/>
    </radialGradient>
    <radialGradient id="waxRim" cx="50%" cy="50%" r="55%">
      <stop offset="82%" stop-color="#9a2020" stop-opacity="0"/>
      <stop offset="94%" stop-color="#2a0606" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a0303" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="cream" cx="45%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#fdf4d3"/>
      <stop offset="100%" stop-color="#e4cf92"/>
    </radialGradient>
    <filter id="sealShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="2" dy="7"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="inkShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="1.5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="outerRing" d="M 256 92 A 164 164 0 1 1 255.99 92"/>
    <path id="innerArc" d="M 156 310 A 100 100 0 0 0 356 310"/>
  </defs>

  <!-- Transparent canvas; seal self-contained -->

  <!-- Main wax body with drop shadow -->
  <g filter="url(#sealShadow)">
    <circle cx="256" cy="256" r="222" fill="url(#wax)"/>
    <circle cx="256" cy="256" r="222" fill="url(#waxRim)"/>
  </g>

  <!-- Subtle highlight to fake wax gloss -->
  <ellipse cx="200" cy="170" rx="78" ry="42" fill="#ffdede" opacity="0.18"/>

  <!-- Wax cracks (authenticity) -->
  <g stroke="#2a0606" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round">
    <path d="M 96 256 l 10 -4 l -3 -9 l 11 -2 l -4 -10"/>
    <path d="M 410 170 l 8 6 l -2 10 l 9 4"/>
    <path d="M 380 380 l -7 6 l 2 9 l -8 5"/>
  </g>

  <!-- Outer ridge rings -->
  <circle cx="256" cy="256" r="208" fill="none" stroke="#f4e4bc" stroke-width="1.5" opacity="0.45"/>
  <circle cx="256" cy="256" r="196" fill="none" stroke="#2a0606" stroke-width="1" opacity="0.55"/>

  <!-- Curved outer text -->
  <text font-family="'Bodoni Moda','Didot','Playfair Display',Georgia,serif" font-size="22" fill="#f4e4bc" font-weight="700" letter-spacing="5" filter="url(#inkShadow)">
    <textPath href="#outerRing" startOffset="0">✦ CANON &#183; SIGNER &#183; ANNO MMXXVI &#183; COSE &#183; ED25519 ✦</textPath>
  </text>

  <!-- Inner divider -->
  <circle cx="256" cy="256" r="132" fill="url(#cream)" stroke="#2a0606" stroke-width="3"/>
  <circle cx="256" cy="256" r="124" fill="none" stroke="#8f1b1b" stroke-width="1" opacity="0.6"/>
  <circle cx="256" cy="256" r="128" fill="none" stroke="#8f1b1b" stroke-width="0.5" opacity="0.8" stroke-dasharray="2,3"/>

  <!-- Radial sunburst ornaments -->
  <g fill="#f4e4bc" font-family="serif" font-size="22" text-anchor="middle" dominant-baseline="central" opacity="0.8">
    <text x="373" y="139">✦</text>
    <text x="139" y="139">✦</text>
    <text x="139" y="373">✦</text>
    <text x="373" y="373">✦</text>
  </g>

  <!-- CS monogram -->
  <text x="256" y="248" font-family="'Bodoni Moda','Didot','Playfair Display',Georgia,serif" font-size="172" fill="#480a0a" text-anchor="middle" dominant-baseline="central" font-weight="700" font-style="italic" filter="url(#inkShadow)">CS</text>

  <!-- Inner arc sublabel -->
  <text font-family="Georgia,serif" font-size="13" fill="#2a0606" font-weight="700" letter-spacing="4">
    <textPath href="#innerArc" startOffset="50%" text-anchor="middle">NOTARY &#183; CHAIN &#183; SIGN</textPath>
  </text>
</svg>
