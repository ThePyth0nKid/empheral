<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400" role="img" aria-label="canon-signer — a cryptographic notary for business facts">
  <title>canon-signer</title>
  <desc>Retro banner — wax seal plus wordmark; Ed25519, COSE_Sign1, hash-chained.</desc>
  <defs>
    <linearGradient id="parch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8efd0"/>
      <stop offset="100%" stop-color="#e8d79b"/>
    </linearGradient>
    <radialGradient id="wax2" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#d84646"/>
      <stop offset="45%" stop-color="#a32424"/>
      <stop offset="100%" stop-color="#480a0a"/>
    </radialGradient>
    <radialGradient id="waxRim2" cx="50%" cy="50%" r="55%">
      <stop offset="82%" stop-color="#9a2020" stop-opacity="0"/>
      <stop offset="94%" stop-color="#2a0606" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a0303" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="cream2" cx="45%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#fdf4d3"/>
      <stop offset="100%" stop-color="#e4cf92"/>
    </radialGradient>
    <filter id="sealShadow2" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="2" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="inkShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1"/>
      <feOffset dx="0" dy="1.2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="bannerOuterRing" d="M 210 200 m -126 0 a 126 126 0 1 1 252 0 a 126 126 0 1 1 -252 0"/>
  </defs>

  <!-- Parchment card -->
  <rect x="8" y="8" width="1584" height="384" rx="14" ry="14" fill="url(#parch)" stroke="#2a1e12" stroke-width="2"/>
  <rect x="20" y="20" width="1560" height="360" rx="8" ry="8" fill="none" stroke="#2a1e12" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.5"/>

  <!-- ===== LEFT: Compact wax seal at (210, 200), r=140 ===== -->
  <g filter="url(#sealShadow2)">
    <circle cx="210" cy="200" r="140" fill="url(#wax2)"/>
    <circle cx="210" cy="200" r="140" fill="url(#waxRim2)"/>
  </g>
  <ellipse cx="175" cy="145" rx="48" ry="26" fill="#ffdede" opacity="0.18"/>
  <!-- Cracks -->
  <g stroke="#2a0606" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round">
    <path d="M 92 200 l 7 -3 l -2 -6 l 8 -2"/>
    <path d="M 310 145 l 6 4 l -1 7 l 6 3"/>
  </g>
  <!-- Ridge rings -->
  <circle cx="210" cy="200" r="130" fill="none" stroke="#f4e4bc" stroke-width="1" opacity="0.45"/>
  <circle cx="210" cy="200" r="124" fill="none" stroke="#2a0606" stroke-width="0.8" opacity="0.55"/>
  <!-- Outer curved text -->
  <text font-family="'Bodoni Moda','Didot','Playfair Display',Georgia,serif" font-size="15" fill="#f4e4bc" font-weight="700" letter-spacing="3">
    <textPath href="#bannerOuterRing" startOffset="0">✦ CANON &#183; SIGNER &#183; ANNO MMXXVI &#183; COSE &#183; ED25519 ✦</textPath>
  </text>
  <!-- Inner cream circle -->
  <circle cx="210" cy="200" r="84" fill="url(#cream2)" stroke="#2a0606" stroke-width="2"/>
  <circle cx="210" cy="200" r="79" fill="none" stroke="#8f1b1b" stroke-width="0.5" opacity="0.8" stroke-dasharray="2,3"/>
  <!-- CS monogram -->
  <text x="210" y="195" font-family="'Bodoni Moda','Didot','Playfair Display',Georgia,serif" font-size="110" fill="#480a0a" text-anchor="middle" dominant-baseline="central" font-weight="700" font-style="italic" filter="url(#inkShadow2)">CS</text>
  <!-- Star ornaments on diagonals -->
  <g fill="#f4e4bc" font-family="serif" font-size="14" text-anchor="middle" dominant-baseline="central" opacity="0.8">
    <text x="284" y="126">✦</text>
    <text x="136" y="126">✦</text>
    <text x="136" y="274">✦</text>
    <text x="284" y="274">✦</text>
  </g>

  <!-- ===== RIGHT: Wordmark + subtitle + tagline ===== -->
  <!-- Decorative flourish left of wordmark -->
  <g stroke="#8f1b1b" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 400 150 Q 420 155 430 140"/>
    <circle cx="436" cy="138" r="3" fill="#8f1b1b" stroke="none"/>
  </g>

  <!-- Wordmark -->
  <text x="400" y="215" font-family="'Bodoni Moda','Didot','Playfair Display',Georgia,'Times New Roman',serif" font-size="128" fill="#2a1e12" font-weight="700" font-style="italic" filter="url(#inkShadow2)">canon-signer</text>

  <!-- Underline ornament -->
  <g stroke="#8f1b1b" stroke-width="1.5" fill="none" opacity="0.75">
    <line x1="400" y1="242" x2="1260" y2="242"/>
    <circle cx="400" cy="242" r="3" fill="#8f1b1b" stroke="none"/>
    <circle cx="1260" cy="242" r="3" fill="#8f1b1b" stroke="none"/>
    <path d="M 828 236 l 6 6 l 6 -6" />
  </g>

  <!-- Subtitle (italic serif) -->
  <text x="400" y="288" font-family="Georgia,'Times New Roman',serif" font-size="28" fill="#8f1b1b" font-style="italic" font-weight="600">a cryptographic notary for business facts</text>

  <!-- Tagline (monospace-ish crypto primitives) -->
  <text x="400" y="330" font-family="'IBM Plex Mono','Consolas','Courier New',monospace" font-size="20" fill="#2a1e12" opacity="0.85" letter-spacing="2">Ed25519 &#8195;&#183;&#8195; COSE_Sign1 &#8195;&#183;&#8195; hash-chained &#8195;&#183;&#8195; RFC 9052</text>

  <!-- Corner runners -->
  <g stroke="#2a1e12" stroke-width="1.2" fill="none" opacity="0.55">
    <path d="M 30 30 l 14 0 M 30 30 l 0 14"/>
    <path d="M 1570 30 l -14 0 M 1570 30 l 0 14"/>
    <path d="M 30 370 l 14 0 M 30 370 l 0 -14"/>
    <path d="M 1570 370 l -14 0 M 1570 370 l 0 -14"/>
  </g>
</svg>
