name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Daily run at 03:00 UTC.  GitHub Actions only schedules from the
  # default branch (main), so this catches silent AWS root rotations
  # even during periods where no PRs are being merged.  03:00 UTC is a
  # low-traffic window for both AWS S3 and GH Actions runners, and
  # places the alert synchronous with European-morning check-in.
  schedule:
    - cron: "0 3 * * *"

env:
  CARGO_TERM_COLOR: always
  # Fail fast on warnings in CI; local dev can still build with them.
  RUSTFLAGS: "-D warnings"

defaults:
  run:
    # The Rust workspace lives under reference/validator, not at repo root.
    working-directory: reference/validator

jobs:
  # Full workspace test suite across the three major targets.  Verifies
  # that every conformance vector passes and that live crypto / live
  # Nitro paths work on every supported developer OS.
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference/validator
      - name: cargo test --workspace
        run: cargo test --workspace --locked

  # Clippy across the three targets. `-D warnings` is already in
  # RUSTFLAGS; we still pass it explicitly to clippy so the lint is
  # applied even if someone drops the env var.
  clippy:
    name: clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable, with clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference/validator
      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # Task D-2 step 1 — ephemeral-core MUST compile without its
  # `test-fixtures` feature. If someone accidentally re-hardwires the
  # feature (e.g. moves it to `default`, or introduces a new dependency
  # that pulls it in via workspace-wide feature unification), this job
  # breaks before anything ships.
  no-default-features-build:
    name: ephemeral-core builds with --no-default-features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference/validator
      - name: cargo build --no-default-features
        run: cargo build --release -p ephemeral-core --no-default-features --locked

  # Task D-2 step 2 — run the local integration test that parses the
  # probe's rlibs and asserts the `test-fixtures` symbols are absent
  # from a production build. This is the Rust-native, cross-platform
  # implementation; the nm-based job below is an independent second
  # check on the same invariant (belt-and-suspenders).
  probe-symbol-test:
    name: probe rlib feature-leak test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference/validator
      - name: cargo test -p ephemeral-prod-symbol-probe --test no_leak
        run: cargo test -p ephemeral-prod-symbol-probe --test no_leak --locked

  # Task D-2 step 3 — redundant, independent nm-based leak check on
  # Ubuntu.  If the Rust-level probe test above ever passes because of
  # a parser bug or a rustc change, `nm` will still catch it.  We
  # scan both relevant rlibs and grep for the forbidden symbols.  A
  # positive-control grep ensures the rlibs are non-empty.
  feature-leak-guard-nm:
    name: feature-leak guard (nm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference/validator
      - name: Build probe with symbol-probe profile
        run: cargo build --profile symbol-probe -p ephemeral-prod-symbol-probe --locked
      - name: Assert forbidden symbols are absent
        shell: bash
        run: |
          set -euo pipefail
          core_rlib=$(ls target/symbol-probe/deps/libephemeral_core-*.rlib | head -n1)
          att_rlib=$(ls target/symbol-probe/deps/libephemeral_attestation-*.rlib | head -n1)
          echo "Scanning $core_rlib and $att_rlib"
          for rlib in "$core_rlib" "$att_rlib"; do
            # Negative: forbidden symbols MUST NOT be present.
            # Covers Phase C.2 (insert_trusted_der_for_test, classify_live_nitro)
            # and Phase C.2.5 (insert_trusted_key_for_test, classify_live_rekor).
            if nm --defined-only "$rlib" 2>/dev/null \
                | grep -E "insert_trusted_der_for_test|classify_live_nitro|insert_trusted_key_for_test|classify_live_rekor"; then
              echo "::error::LEAK: test-fixtures symbol found in $rlib"
              exit 1
            fi
          done
          # Positive control: core rlib must contain `total_failing`,
          # attestation rlib must contain `sha256_fingerprint`. If
          # neither matches, the rlib was stripped too hard and the
          # negative check above is meaningless.
          if ! nm --defined-only "$core_rlib" 2>/dev/null | grep -q total_failing; then
            echo "::error::control check failed: total_failing not found in $core_rlib"
            exit 1
          fi
          if ! nm --defined-only "$att_rlib" 2>/dev/null | grep -q sha256_fingerprint; then
            echo "::error::control check failed: sha256_fingerprint not found in $att_rlib"
            exit 1
          fi
          echo "feature-leak guard (nm): OK"

  # Determinism tripwires from the Phase C.2 commit stack. If the
  # vector-signer output or the committed c2-live vector file drift
  # without intent, CI flashes red.
  determinism-tripwires:
    name: determinism tripwires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference/validator
      - name: vector-signer dry-run SHA256 (phase C.2)
        shell: bash
        run: |
          set -euo pipefail
          actual=$(cargo run -p vector-signer --release --quiet --locked -- gen-phase-c2 --dry-run | sha256sum | awk '{print $1}')
          expected="87f985aa9046b008851a30f6244fa168eeb65853442ed00179d33fb43ce46869"
          if [ "$actual" != "$expected" ]; then
            echo "::error::gen-phase-c2 dry-run SHA drifted: got $actual, expected $expected"
            exit 1
          fi
      - name: pcr-attestation-reject-c2-live.json SHA256
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          actual=$(sha256sum conformance/pcr-attestation-reject-c2-live.json | awk '{print $1}')
          expected="3a73b2507b8967b56a7a6829d0c1b85e8110203c2598d40be3e62c4117007d1c"
          if [ "$actual" != "$expected" ]; then
            echo "::error::c2-live vector file drifted: got $actual, expected $expected"
            exit 1
          fi
      # Phase C.2.5 (live Rekor) determinism tripwires. Mirrors the C.2
      # structure above. The Rust-side golden-file guard in
      # tools/vector-signer/tests/determinism_c2_5.rs independently pins
      # the same dry-run SHA; if either diverges, investigate before
      # updating either pin.
      - name: vector-signer dry-run SHA256 (phase C.2.5)
        shell: bash
        run: |
          set -euo pipefail
          actual=$(cargo run -p vector-signer --release --quiet --locked -- gen-phase-c2-5 --dry-run | sha256sum | awk '{print $1}')
          expected="65f0ef5dc819e025267d14a76857ca2e61761a90c995878941053c643b6d102f"
          if [ "$actual" != "$expected" ]; then
            echo "::error::gen-phase-c2-5 dry-run SHA drifted: got $actual, expected $expected"
            exit 1
          fi
      - name: pcr-attestation-reject-c2-5-rekor.json SHA256
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          actual=$(sha256sum conformance/pcr-attestation-reject-c2-5-rekor.json | awk '{print $1}')
          expected="c37f4ac5564d5832dced760f07adc78ca93f5db9c3faf4e8754fcd35d9f8fb95"
          if [ "$actual" != "$expected" ]; then
            echo "::error::c2-5-rekor vector file drifted: got $actual, expected $expected"
            exit 1
          fi
      - name: vector-signer determinism_c2_5 integration test
        shell: bash
        run: cargo test -p vector-signer --test determinism_c2_5 --locked

  # AWS Nitro Enclave Root G1 drift guard.  The DER SHA-256 fingerprint
  # of the live AWS-published root is compared against the in-tree
  # constant (`ephemeral-attestation::AWS_NITRO_ROOT_FINGERPRINT`).  If
  # AWS ever rotates the root — or if the artifact served from S3 is
  # tampered — the compare step goes red with an actionable message.
  #
  # Threat model (explicit assumptions; see design-final-v2.md §9.3):
  # - DETECTIVE control: trusts the ubuntu-latest CA bundle + TLS to
  #   AWS S3 + the GH Actions runner image itself.  A compromised
  #   runner defeats this control entirely.
  # - Upstream-action tag resolution (`actions/checkout@v4` etc.) is
  #   consistent with the rest of this workflow; SHA-pinning is a
  #   repo-wide hardening item tracked separately.
  # - On `schedule:` triggers, ALL jobs in this file run — including
  #   `determinism-tripwires`, which invokes `vector-signer --dry-run`
  #   with the `test-fixtures` feature enabled.  Any `build.rs` added
  #   to a transitive dependency of that crate would execute here;
  #   no `build.rs` exists in the workspace today.
  #
  # A human must still perform out-of-band verification before
  # touching the constant; the guard exists so silent rotation cannot
  # slip in unnoticed.
  nitro-root-fingerprint:
    name: nitro-root-fingerprint drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference/validator
      - name: Print pinned fingerprint from the in-tree constant
        id: pinned
        shell: bash
        run: |
          set -euo pipefail
          # Tool links the const directly; its stdout is byte-identical
          # to what ephemeral-attestation consumes at runtime.  Parsing
          # the Rust source in CI would be brittle against rustfmt.
          pinned=$(cargo run --release --quiet --locked -p ephemeral-print-root-fingerprint)
          if [[ ! "$pinned" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::print-root-fingerprint produced unexpected output: '$pinned'"
            exit 1
          fi
          echo "pinned=$pinned" >> "$GITHUB_OUTPUT"
          echo "pinned (ephemeral-attestation::AWS_NITRO_ROOT_FINGERPRINT): $pinned"
      - name: Fetch AWS Nitro Root G1 and compute live fingerprint
        id: live
        shell: bash
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          # `-f` makes curl fail on HTTP 4xx/5xx (primary HTTP-error
          # guard — fails fast with a clear exit code rather than
          # saving an HTML error body to disk).  `--proto '=https'`
          # and `--tlsv1.2` prevent any protocol/version downgrade.
          # `--retry 3 --retry-delay 5 --max-time 30` absorbs a
          # transient S3 hiccup without masking a persistent outage.
          # The size-sanity floor below is a second layer (defence-
          # in-depth), not the primary HTTP-status check.
          curl --retry 3 --retry-delay 5 --max-time 30 -fsSL \
            --proto '=https' --tlsv1.2 \
            -o "$tmp/root.zip" \
            https://aws-nitro-enclaves.amazonaws.com/AWS_NitroEnclaves_Root-G1.zip
          # `wc -c <file` is POSIX-portable (works on GNU coreutils AND
          # BSD macOS `stat`-less environments, should the runner image
          # ever change).  Known-good size is 749 bytes (zip of a
          # single ~777-byte PEM).  The >500-byte floor catches most
          # truncated or substituted payloads without over-pinning to
          # exact bytes (which would turn a benign AWS repackage into
          # a false positive).
          zip_size=$(wc -c < "$tmp/root.zip")
          if [ "$zip_size" -lt 500 ]; then
            echo "::error::Downloaded zip is suspiciously small ($zip_size bytes)."
            echo "::error::Expected ~749 bytes.  Treating as fetch failure, not drift."
            exit 1
          fi
          # Member-count + member-name validation BEFORE streaming.
          # Rejects: (a) zips with multiple members (unexpected shape),
          # (b) zips missing `root.pem` — which would cause `unzip -p`
          # to exit 0 with empty stdout on some versions, and the
          # downstream regex guard to fire with a cryptic "unexpected
          # shape" message instead of a clear root-cause.
          members=$(unzip -Z1 "$tmp/root.zip")
          member_count=$(printf '%s\n' "$members" | wc -l)
          if [ "$member_count" -ne 1 ]; then
            echo "::error::Zip member count unexpected: $member_count (expected 1)."
            echo "::error::Members: $(printf '%s' "$members" | tr '\n' ',')"
            exit 1
          fi
          if ! printf '%s\n' "$members" | grep -qx 'root.pem'; then
            echo "::error::Expected member 'root.pem' not found in zip."
            echo "::error::Actual member: '$members'"
            exit 1
          fi
          # Pipeline (zip-slip-safe via `-p` + explicit member name):
          # unzip -p root.pem
          #   → head -c 65536   (zip-bomb ceiling; real PEM is ~777 B)
          #   → openssl x509 -outform DER     (PEM → DER re-encoding)
          #   → sha256sum                     (guaranteed lowercase hex)
          #   → awk '{print $1}'              (strip filename field)
          # `sha256sum` (GNU coreutils, always on ubuntu-latest) emits
          # `<hash>  -` deterministically — no version-dependent format
          # drift unlike `openssl dgst -r`.
          live=$(unzip -p "$tmp/root.zip" root.pem \
            | head -c 65536 \
            | openssl x509 -outform DER \
            | sha256sum \
            | awk '{print $1}')
          if [[ ! "$live" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::Live fingerprint has unexpected shape: '$live'"
            echo "::error::The PEM → DER → SHA-256 pipeline produced something other"
            echo "::error::than 64 lowercase hex characters.  Investigate before drift-diagnosing."
            exit 1
          fi
          echo "live=$live" >> "$GITHUB_OUTPUT"
          echo "live (AWS S3):                                        $live"
      - name: Compare pinned vs live
        shell: bash
        env:
          PINNED: ${{ steps.pinned.outputs.pinned }}
          LIVE: ${{ steps.live.outputs.live }}
        run: |
          set -euo pipefail
          if [ "$PINNED" != "$LIVE" ]; then
            echo "::error::AWS Nitro Enclave Root G1 fingerprint MISMATCH."
            echo "::error::pinned (ephemeral-attestation::AWS_NITRO_ROOT_FINGERPRINT): $PINNED"
            echo "::error::live   (https://aws-nitro-enclaves.amazonaws.com/AWS_NitroEnclaves_Root-G1.zip): $LIVE"
            echo "::error::This means AWS has rotated the Nitro root, OR the fetched artifact is tampered."
            echo "::error::DO NOT auto-update the constant.  Manual out-of-band verification is required:"
            echo "::error::  1) cross-check the new root via AWS docs + a second, independent network path"
            echo "::error::  2) confirm via AWS support channel that a rotation occurred"
            echo "::error::  3) only then update AWS_NITRO_ROOT_FINGERPRINT in crates/ephemeral-attestation/src/lib.rs"
            exit 1
          fi
          echo "nitro-root-fingerprint: OK ($PINNED)"
          echo "AWS Nitro Root G1 has a ~30-year lifetime; a mismatch here is a real signal, not flake."
